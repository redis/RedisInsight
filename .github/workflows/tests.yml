name: ✅ Tests

on:
  push:
    branches-ignore:
      - main
      - latest
      - 'release/**'
  pull_request:
    types: [labeled]

  workflow_dispatch:
    inputs:
      redis_client:
        description: Library to use for redis connection
        default: 'ioredis'
        type: choice
        options:
          - ioredis
          - node-redis

      short_rte_list:
        description: Use short RTE list for IT
        type: boolean
        default: true

      debug:
        description: Enable SSH Debug (IT and E2E)
        default: false
        type: boolean

  workflow_call:
    inputs:
      short_rte_list:
        description: Use short rte list
        type: boolean
        default: true
      pre_release:
        description: Is pre-release
        default: false
        type: boolean
      debug:
        description: Enable SSH Debug
        default: false
        type: boolean

# Cancel a previous run workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      desktop: ${{ steps.filter.outputs.desktop }}
      docker: ${{ steps.filter.outputs.docker }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            frontend:
              - 'redisinsight/ui/**'
            backend:
              - 'redisinsight/api/**'
            desktop:
              - 'redisinsight/desktop/**'
            docker:
              - 'Dockerfile*'
              - '.dockerignore'
              - '*docker*.sh'
            # Shared toolchain / CI config — when these change, run everything.
            infra:
              - 'package.json'
              - 'yarn.lock'
              - '.yarnrc'
              - '.nvmrc'
              - '.eslintrc*'
              - '.eslintignore'
              - 'babel.config*'
              - 'jest.config*'
              - 'jest-resolver.js'
              - 'configs/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - '.github/actions/**'

  # Check common conditions that trigger all test suites
  should-run-all-tests:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        env:
          PRERELEASE_CONDITION: ${{ inputs.pre_release == true }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra }}
        run: |
          OTHER_CONDITIONS="${{ github.event_name == 'workflow_dispatch' ||
              startsWith(github.ref_name, 'release/') ||
              startsWith(github.ref_name, 'ric/') ||
              github.ref_name == 'latest' ||
              contains(github.event.pull_request.labels.*.name, 'run-all-tests') }}"

          if [[ "$PRERELEASE_CONDITION" == "true" ]] || [[ "$OTHER_CONDITIONS" == "true" ]] || [[ "$INFRA_CHANGED" == "true" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  type-check:
    needs: [changes, should-run-all-tests]
    uses: ./.github/workflows/type-check.yml
    with:
      run-ui: ${{ needs.should-run-all-tests.outputs.result == 'true' || needs.changes.outputs.frontend == 'true' || contains(github.event.pull_request.labels.*.name, 'run-frontend-tests') }}
      run-api: ${{ needs.should-run-all-tests.outputs.result == 'true' || needs.changes.outputs.backend == 'true' || contains(github.event.pull_request.labels.*.name, 'run-backend-tests') }}
      run-desktop: ${{ needs.should-run-all-tests.outputs.result == 'true' || needs.changes.outputs.desktop == 'true' }}
    secrets: inherit

  docker-build:
    needs: [changes, should-run-all-tests]
    if: |
      needs.should-run-all-tests.outputs.result == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.docker == 'true'
    uses: ./.github/workflows/docker-build.yml

  frontend-tests:
    needs: [changes, lint, type-check, should-run-all-tests]
    if: |
      needs.should-run-all-tests.outputs.result == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-frontend-tests')
    uses: ./.github/workflows/tests-frontend.yml
    secrets: inherit

  frontend-tests-coverage:
    needs: frontend-tests
    uses: ./.github/workflows/code-coverage.yml
    secrets: inherit
    with:
      resource_name: report-fe
      type: unit

  backend-tests:
    needs: [changes, lint, type-check, should-run-all-tests]
    if: |
      needs.should-run-all-tests.outputs.result == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-backend-tests')
    uses: ./.github/workflows/tests-backend.yml
    secrets: inherit

  backend-tests-coverage:
    needs: backend-tests
    uses: ./.github/workflows/code-coverage.yml
    secrets: inherit
    with:
      resource_name: report-be
      type: unit

  integration-tests:
    needs: [changes, lint, type-check, should-run-all-tests]
    if: |
      needs.should-run-all-tests.outputs.result == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    uses: ./.github/workflows/tests-integration.yml
    secrets: inherit
    with:
      short_rte_list: ${{ inputs.short_rte_list || true }}
      redis_client: ${{ inputs.redis_client || '' }}
      debug: ${{ inputs.debug || false }}

  integration-tests-coverage:
    needs: integration-tests
    uses: ./.github/workflows/code-coverage.yml
    secrets: inherit
    with:
      resource_name: integration-coverage
      type: integration

  clean:
    uses: ./.github/workflows/clean-deployments.yml
    if: always()
    needs:
      [
        frontend-tests,
        backend-tests,
        integration-tests,
      ]

  # Remove artifacts from github actions
  remove-artifacts:
    name: Remove artifacts
    needs:
      [
        frontend-tests,
        backend-tests,
        integration-tests,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Remove all artifacts
        uses: ./.github/actions/remove-artifacts
