name: Tests UI
on:
  workflow_call:

env:
  REPORT_NAME: 'report-fe'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Frontend tests
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install all libs and dependencies
        uses: ./.github/actions/install-all-build-libs
        with:
          skip-system-deps: '1'

      - name: Install osv-scanner
        uses: ./.github/actions/install-osv-scanner

      - name: UI dependencies audit
        # Informational; only a failed scan blocks CI (see deps-audit.sh).
        run: .github/deps-audit.sh yarn.lock "UI"

      - name: Unit tests UI
        timeout-minutes: 30
        run: yarn test:cov --ci --silent

      - name: Upload Test Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ env.REPORT_NAME }}
          path: report
