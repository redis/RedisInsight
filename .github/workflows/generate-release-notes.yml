name: Generate Release Notes

on:
  workflow_call:
    inputs:
      version:
        description: Release version (e.g., 3.0.0)
        required: true
        type: string
      base_branch:
        description: Base branch for comparison (default: main)
        required: false
        type: string
        default: 'main'
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g., 3.0.0)
        required: true
        type: string
      base_branch:
        description: Base branch for comparison (default: main)
        required: false
        type: string
        default: 'main'

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-release-notes.js \
            "${{ inputs.version || github.event.inputs.version }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --base-branch "${{ inputs.base_branch || github.event.inputs.base_branch || 'main' }}" \
            --output "RELEASE_NOTES.md"

      - name: Display release notes
        run: |
          echo "## Release Notes Preview"
          echo ""
          cat RELEASE_NOTES.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

      - name: Create Pull Request Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('RELEASE_NOTES.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📝 Generated Release Notes\n\n\`\`\`\n${notes}\n\`\`\``
            });
