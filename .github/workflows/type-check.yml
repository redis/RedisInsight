name: Type check

on:
  workflow_call:
    inputs:
      run-ui:
        type: boolean
        default: true
      run-api:
        type: boolean
        default: true
      run-desktop:
        type: boolean
        default: true
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  type-check:
    runs-on: ubuntu-latest
    name: tsc baselines
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Install dependencies
        uses: ./.github/actions/install-all-build-libs
        with:
          skip-system-deps: '1'

      # npm run --prefix exposes only the sub-dir's node_modules/.bin, not root's.
      # Workspace-level scripts (npm run ... --prefix redisinsight/<ws>) pipe through
      # tsc / tsc-output-parser / tsx, which only live in the root node_modules.
      # Putting root's .bin on PATH lets nested invocations find them.
      - name: Expose root node_modules/.bin
        run: echo "$(pwd)/node_modules/.bin" >> $GITHUB_PATH

      # UI plugins under redisinsight/ui/src/packages/* are sub-projects with
      # their own deps. The UI tsconfig includes src/**, so plugin sources are
      # type-checked too and need their deps installed for module resolution.
      - name: Cache UI plugin node_modules
        if: ${{ inputs.run-ui != false }}
        uses: actions/cache@v6
        with:
          path: |
            redisinsight/ui/src/packages/node_modules
            redisinsight/ui/src/packages/*/node_modules
          key: ui-plugins-node-modules-${{ runner.os }}-${{ hashFiles('redisinsight/ui/src/packages/**/package-lock.json') }}

      - name: Install UI plugin deps and build statics
        if: ${{ inputs.run-ui != false }}
        run: npm run build:statics

      - name: UI
        if: ${{ inputs.run-ui != false }}
        run: npm run type-check --prefix redisinsight/ui

      - name: API
        if: ${{ inputs.run-api != false }}
        run: npm run type-check --prefix redisinsight/api

      # Desktop sources import from redisinsight/api/dist/src/**, so the api
      # has to be built first or those imports show up as TS2307/TS2749 errors.
      # Use the default nest build (not build:prod) so `.d.ts` files are emitted.
      - name: Build API (for desktop type-check)
        if: ${{ inputs.run-desktop != false }}
        run: npm run build --prefix redisinsight/api

      - name: Desktop
        if: ${{ inputs.run-desktop != false }}
        run: npm run type-check --prefix redisinsight/desktop

      - name: Configs
        run: npx tsc --project configs/tsconfig.json --noEmit
