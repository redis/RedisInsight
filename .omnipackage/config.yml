# omnipackage configuration for RedisInsight.
# Docs: https://docs.omnipackage.org
#
# Build model (Electron, electron-builder "dir" approach):
#   .omnipackage/prepare.sh   (before_build_script) — bootstraps nvm + node 22,
#                              fixes python3 for node-gyp, enables CRB on EL clones.
#   .omnipackage/install.sh    — runs the real RedisInsight build (yarn install in
#                              root + redisinsight + redisinsight/api, build:statics,
#                              package:prod --linux dir), then stages
#                              release/linux-unpacked into /opt/redisinsight.
# rpm %build / deb dh_auto_build stay empty; everything happens in install.sh.

# Version comes from the app manifest electron-builder packages.
version_extractors:
  - name: package_json
    provider: "file"
    file:
      file: "redisinsight/package.json"
      regex: '"version": "([^"]+)"'

common: &common
  package_name: "redisinsight"
  maintainer: "Redis Ltd. <support@redis.com>"
  homepage: https://github.com/RedisInsight/RedisInsight
  description: Redis Insight - a powerful GUI for Redis databases

# Skip when staging the source tree into the build container (gitignore-style).
# node_modules are reinstalled in-container; build artefacts are regenerated.
ignore_source_files:
  - .git
  - .env
  - .DS_Store
  - "*.log"
  - node_modules
  - /release
  - /vendor
  - /dist
  - redisinsight/dist

repositories:
  - name: R2 test repo
    provider: s3
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    <<: *common
    s3:
      bucket: repositories-test
      path_in_bucket: "redisinsight"
      bucket_public_url: "https://repositories-test.omnipackage.org"
      endpoint: "${CLOUDFLARE_R2_ENDPOINT}"
      access_key_id: "${CLOUDFLARE_R2_ACCESS_KEY_ID}"
      secret_access_key: "${CLOUDFLARE_R2_SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true
      cloudflare_zone_id: "${CLOUDFLARE_ZONE_ID}"
      cloudflare_api_token: "${CLOUDFLARE_API_TOKEN}"

  - name: Local test
    <<: *common
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    provider: localfs
    localfs:
      path: /run/media/oleg/c3996ce0-a379-4403-9d64-7d4c0536463f/dev/omnipackage-repos/redisinsight


# ---- format bases -------------------------------------------------------------

rpm: &rpm
  <<: *common
  before_build_script: ".omnipackage/prepare.sh"
  # Shared libs (libsecret, libstdc++, …) are auto-detected by rpmbuild from the
  # linked binaries. Only xdg-utils (invoked at runtime to open links) is listed.
  runtime_dependencies: ["xdg-utils"]
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  before_build_script: ".omnipackage/prepare.sh"
  # dh_shlibdeps stays enabled (see debian/rules) and auto-detects all linked
  # runtime libs into ${shlibs:Depends} with correct per-distro (t64) names —
  # prepare.sh installs those libs so shlibdeps can resolve them. Only deps that
  # ELF scanning can't see are listed here: xdg-utils (spawned to open links)
  # and libnotify4 (dlopened for desktop notifications).
  runtime_dependencies:
    [
      "xdg-utils",
      "libnotify4",
    ]
  deb:
    debian_templates: ".omnipackage/deb"

# ---- per-family build dependencies --------------------------------------------
# Only keytar (libsecret) and better-sqlite3 (sqlite, header-only via node-gyp)
# need system build tooling; native deps build under node-gyp + electron-rebuild.

fedora: &fedora
  <<: *rpm
  build_dependencies:
    [
      "gcc", "gcc-c++", "make",
      "python3", "python3-setuptools",
      "git", "wget", "curl", "ca-certificates",
      "tar", "xz", "unzip",
      "pkgconf-pkg-config", "libsecret-devel",
    ]

# AlmaLinux / RockyLinux. libsecret-devel lives in CRB (disabled by default), so
# it is NOT listed here — prepare.sh enables CRB and installs it inline (the
# initial dnf install runs before before_build_script).
redhat: &redhat
  <<: *rpm
  build_dependencies:
    [
      "gcc", "gcc-c++", "make",
      "python3", "python3-setuptools",
      "git", "wget", "curl", "ca-certificates",
      "tar", "xz", "unzip",
      "pkgconf-pkg-config",
    ]

# openSUSE uses pkg-config (not pkgconf-pkg-config). curl/wget are intentionally
# omitted on Tumbleweed (a libcurl/ngtcp2 skew breaks them and zypper); the base
# image's preinstalled curl is enough for nvm.
opensuse: &opensuse
  <<: *rpm
  build_dependencies:
    [
      "gcc", "gcc-c++", "make",
      "python3", "python3-setuptools",
      "git",
      "tar", "xz", "unzip",
      "pkg-config", "libsecret-devel",
    ]

# Mageia ships -devel headers under lib64*-devel on x86_64 and uses bare pkgconf.
mageia: &mageia
  <<: *rpm
  build_dependencies:
    [
      "gcc", "gcc-c++", "make",
      "python3", "python3-setuptools",
      "git", "wget", "curl",
      "tar", "xz", "unzip",
      "pkgconf", "lib64secret-devel",
    ]

debian: &debian
  <<: *deb
  build_dependencies:
    [
      "build-essential", "git",
      "wget", "curl", "ca-certificates",
      "xz-utils", "unzip",
      "pkg-config",
      "python3", "python3-setuptools",
      "libsecret-1-dev",
    ]

# ---- build matrix -------------------------------------------------------------
# Floor: node 22 + gcc 11 (C++20 native modules). EOL / pre-gcc11 distros dropped.

builds:
  - { distro: "fedora_40", <<: *fedora }
  - { distro: "fedora_41", <<: *fedora }
  - { distro: "fedora_42", <<: *fedora }
  - { distro: "fedora_43", <<: *fedora }
  - { distro: "fedora_44", <<: *fedora }
  - { distro: "fedora_rawhide", <<: *fedora }

  - { distro: "opensuse_tumbleweed", <<: *opensuse }
  - { distro: "opensuse_16.0", <<: *opensuse }

  - { distro: "almalinux_9", <<: *redhat }
  - { distro: "almalinux_10", <<: *redhat }
  - { distro: "rockylinux_9", <<: *redhat }
  - { distro: "rockylinux_10", <<: *redhat }

  - { distro: "mageia_9", <<: *mageia }

  - { distro: "debian_12", <<: *debian }
  - { distro: "debian_13", <<: *debian }
  - { distro: "debian_testing", <<: *debian }
  - { distro: "debian_unstable", <<: *debian }
  - { distro: "ubuntu_22.04", <<: *debian }
  - { distro: "ubuntu_24.04", <<: *debian }
  - { distro: "ubuntu_25.04", <<: *debian }
  - { distro: "ubuntu_25.10", <<: *debian }
  - { distro: "ubuntu_26.04", <<: *debian }
